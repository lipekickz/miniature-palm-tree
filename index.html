<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voicebank Editor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
body{margin:0;padding:20px;background:#111;color:#fff;font-family:Arial,sans-serif}
h1{margin-top:0}
#fileList{margin-top:15px;border:1px solid #444;height:300px;overflow:auto}
.file{padding:10px;border-bottom:1px solid #333;cursor:pointer}
.file:hover{background:#222}
.box{margin-top:20px}
input[type=range]{width:100%}
button{margin-top:10px;padding:10px;cursor:pointer;margin-right:6px}
</style>
</head>
<body>
<h1>Voicebank Editor</h1>
<input type="file" id="audioInput" accept=".wav,.zip" multiple>
<div id="fileList"></div>

<div class="box">
<p><b>Arquivo:</b> <span id="currentFile">Nenhum</span></p>

<button id="playBtn">▶️ Reproduzir Preview</button>
<button id="stopBtn">⏹️ Parar</button>
<button id="applyAll">Aplicar para todos</button>
<button id="exportSettings">Exportar Configurações</button>
<button id="exportZip">Exportar ZIP Modificado</button>

<p>Pitch: <span id="pitchText">0</span></p>
<input type="range" id="pitch" min="-12" max="12" value="0">

<p>Velocidade: <span id="speedText">1</span></p>
<input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">

<p>Volume: <span id="volumeText">100</span>%</p>
<input type="range" id="volume" min="0" max="200" value="100">
</div>

<script>
const audioInput = document.getElementById("audioInput");
const fileList = document.getElementById("fileList");
const pitch = document.getElementById("pitch");
const speed = document.getElementById("speed");
const volume = document.getElementById("volume");
const pitchText = document.getElementById("pitchText");
const speedText = document.getElementById("speedText");
const volumeText = document.getElementById("volumeText");
const currentFile = document.getElementById("currentFile");

let files = [];
let settings = {};
let audioContext = new (window.AudioContext || window.webkitAudioContext)();
let currentBuffer = null;
let currentSource = null;

audioInput.addEventListener("change", async (e)=>{
    files = [];
    settings = {};
    fileList.innerHTML = "";

    for(const file of e.target.files){
        if(file.name.toLowerCase().endsWith(".wav")){
            addFile(file, file.name);
        } else if(file.name.toLowerCase().endsWith(".zip")){
            const zip = await JSZip.loadAsync(file);
            for(const name in zip.files){
                const entry = zip.files[name];
                if(!entry.dir && name.toLowerCase().endsWith(".wav")){
                    const blob = await entry.async("blob");
                    const wav = new File([blob], name.split("/").pop(), {type:"audio/wav"});
                    addFile(wav, name);
                }
            }
        }
    }
});

function addFile(file, displayName){
    files.push(file);
    const div = document.createElement("div");
    div.className = "file";
    div.textContent = displayName;
    div.onclick = ()=>openFile(file);
    fileList.appendChild(div);
}

async function openFile(file){
    currentFile.textContent = file.name;
    const arrayBuffer = await file.arrayBuffer();
    currentBuffer = await audioContext.decodeAudioData(arrayBuffer.slice(0));

    const data = settings[file.name];
    if(data){
        pitch.value = data.pitch;
        speed.value = data.speed;
        volume.value = data.volume;
    }else{
        pitch.value = 0;
        speed.value = 1;
        volume.value = 100;
    }
    updateUI();
}

function updateUI(){
    pitchText.textContent = pitch.value;
    speedText.textContent = speed.value;
    volumeText.textContent = volume.value;
}

function saveSettings(){
    updateUI();
    const file = currentFile.textContent;
    if(file === "Nenhum") return;
    settings[file] = {
        pitch: Number(pitch.value),
        speed: Number(speed.value),
        volume: Number(volume.value)
    };
}

pitch.oninput = saveSettings;
speed.oninput = saveSettings;
volume.oninput = saveSettings;

function playPreview(){
    if(!currentBuffer) return;

    if(audioContext.state === "suspended"){
        audioContext.resume();
    }

    if(currentSource){
        try { currentSource.stop(); } catch(e){}
    }

    currentSource = audioContext.createBufferSource();
    const gain = audioContext.createGain();

    currentSource.buffer = currentBuffer;
    const pitchRate = Math.pow(2, Number(pitch.value) / 12);
    currentSource.playbackRate.value = pitchRate * Number(speed.value);
    gain.gain.value = Number(volume.value) / 100;

    currentSource.connect(gain);
    gain.connect(audioContext.destination);
    currentSource.start();
}

function stopPreview(){
    if(currentSource){
        try { currentSource.stop(); } catch(e){}
        currentSource = null;
    }
}

playBtn.onclick = playPreview;
stopBtn.onclick = stopPreview;

applyAll.onclick = ()=>{
    const current = settings[currentFile.textContent];
    if(!current){
        alert("Selecione um WAV primeiro.");
        return;
    }
    files.forEach(f => settings[f.name] = {...current});
    alert("Configurações aplicadas.");
};

exportSettings.onclick = ()=>{
    const blob = new Blob(
        [JSON.stringify(settings, null, 2)],
        {type:"application/json"}
    );
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "voicebank-settings.json";
    a.click();
};

exportZip.onclick = async () => {
    try {
        if (files.length === 0) {
            alert("Nenhum arquivo carregado.");
            return;
        }

        alert("Iniciando exportação...");

        const zip = new JSZip();

        for (const file of files) {
            zip.file(file.name, file);
        }

        const blob = await zip.generateAsync({
            type: "blob"
        });

        alert("ZIP criado!");

        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "voicebank.zip";
        document.body.appendChild(a);
        a.click();
        a.remove();

        alert("Download iniciado!");
    }
    catch (e) {
        alert("Erro: " + e.message);
        console.error(e);
    }
};
    
    const zip = new JSZip();

    for(const file of files){
        const arrayBuffer = await file.arrayBuffer();
        const buffer = await audioContext.decodeAudioData(arrayBuffer.slice(0));

        const cfg = settings[file.name] || {
            pitch:0,
            speed:1,
            volume:100
        };

        const rate =
            Math.pow(2, cfg.pitch / 12) *
            cfg.speed;

        const newLength =
            Math.ceil(buffer.length / rate);

        const offline = new OfflineAudioContext(
            buffer.numberOfChannels,
            newLength,
            buffer.sampleRate
        );

        const source =
            offline.createBufferSource();

        const gain =
            offline.createGain();

        source.buffer = buffer;
        source.playbackRate.value = rate;
        gain.gain.value = cfg.volume / 100;

        source.connect(gain);
        gain.connect(offline.destination);

        source.start();

        const rendered =
            await offline.startRendering();

        zip.file(
            file.name,
            audioBufferToWav(rendered)
        );
    }

    zip.file(
        "voicebank-settings.json",
        JSON.stringify(settings, null, 2)
    );

    const blob =
        await zip.generateAsync({type:"blob"});

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "voicebank-editado.zip";
    a.click();
};

function audioBufferToWav(buffer){
    const numChannels = buffer.numberOfChannels;
    const sampleRate = buffer.sampleRate;
    const samples = buffer.length;
    const blockAlign = numChannels * 2;
    const dataSize = samples * blockAlign;

    const wav = new ArrayBuffer(44 + dataSize);
    const view = new DataView(wav);

    function writeString(offset, str){
        for(let i=0;i<str.length;i++){
            view.setUint8(offset+i, str.charCodeAt(i));
        }
    }

    writeString(0,"RIFF");
    view.setUint32(4,36+dataSize,true);
    writeString(8,"WAVE");
    writeString(12,"fmt ");
    view.setUint32(16,16,true);
    view.setUint16(20,1,true);
    view.setUint16(22,numChannels,true);
    view.setUint32(24,sampleRate,true);
    view.setUint32(28,sampleRate*blockAlign,true);
    view.setUint16(32,blockAlign,true);
    view.setUint16(34,16,true);
    writeString(36,"data");
    view.setUint32(40,dataSize,true);

    let offset = 44;
    for(let i=0;i<samples;i++){
        for(let ch=0; ch<numChannels; ch++){
            let sample = buffer.getChannelData(ch)[i];
            sample = Math.max(-1, Math.min(1, sample));
            view.setInt16(
                offset,
                sample < 0 ? sample * 0x8000 : sample * 0x7FFF,
                true
            );
            offset += 2;
        }
    }

    return new Blob([wav], {type:"audio/wav"});
}
</script>
</body>
</html>
